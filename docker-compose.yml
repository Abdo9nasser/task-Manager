services:

  nginx:
    image: nginx:alpine
    container_name: task-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend


  frontend:
    build: ./frontend
    
     

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - mongo


  mongo:
    image: mongo:latest
    volumes:
      - mongo_data:/data/db


volumes:
  mongo_data: