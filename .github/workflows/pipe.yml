name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Debug Files
        run: |
         pwd
         ls -la
         find . -maxdepth 2

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/task-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/task-frontend:latest ./frontend

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/task-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/task-frontend:latest

      - name: Copy Ansible Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "ansible/*"
          target: "/home/${{ secrets.SERVER_USER }}/ansible"

      - name: Deploy with Ansible
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ansible

            ansible-playbook playbook.yml \
              --inventory inventory \
              --vault-password-file .vault_pass
#done